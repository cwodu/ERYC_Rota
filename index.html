
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rota Hours Calculator</title>
<!--Remove outside fonts
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">
-->
<style>
  
   :root {
    --bg: #f9fafb;
    --surface: #eeeeee;
    --surface2:  #047857;
    --border: #2e4643;
    --accent: #007569;
    --accent2: #991b1b;
    --accent3: #0066cc;
    --text: #363637;
    --text-muted: #52565f;
    --night: #2b259f;
    --weekend: #751080;
    --normal: #2f7d6e;
  }


  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 40px 20px;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,229,192,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  .app {
    max-width: 960px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 48px;
  }

  header h1 {
    font-family: 'Roboto Slab', serif;
    font-size: 2.5rem;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }

  header p {
    margin-top: 10px;
    color: var(--text-muted);
    font-family: /*'DM Mono', monospace;*/ 'Roboto Slab', serif; 
    font-size: 0.85rem;
    letter-spacing: 0.5px;
  }

  .legend {
    display: flex;
    gap: 20px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
  }

  .weeks-container { display: flex; flex-direction: column; gap: 32px; }

  .week-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .week-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .week-header h2 {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--bg);
    font-family: 'DM Mono', monospace;
  }

  .btn-remove-week {
    background: #991b1b;
    border: 1px solid #3a1a1a;
    color: #fff;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-remove-week:hover { background: #3a1a1a; }

  .days-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0;
  }

  .day-row {
    display: grid;
    grid-template-columns: 100px 1fr auto;
    align-items: center;
    padding: 14px 24px;
    /*border-bottom: 1px solid var(--border);
    */
    gap: 16px;
    transition: background 0.15s;
  }

  /*.day-row:last-child { border-bottom: none; }
  .day-row:hover { background: rgba(255,255,255,0.02); }
  */
  .day-wrapper { border-bottom: 1px solid var(--border); }
  .day-wrapper:last-child { border-bottom: none; }
  .day-wrapper:hover { background: rgba(255,255,255,0.02); }

  /* .day-row.is-weekend .day-label { color: var(--weekend); }*/
  .day-label.is-weekend { color: var(--weekend); }

  .day-label {
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.5px;
  }

  .time-inputs {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .input-group input[type="time"]:invalid {
  border-color: #ef4444;
  box-shadow: 0 0 0 3px rgba(239,68,68,0.15);
}


  .input-group label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .input-group input {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    padding: 8px 10px;
    width: 150px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-group input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,192,0.1);
  }

  /*.day-row.is-off .input-group input,
  .day-row.is-off .input-group label {
    opacity: 0.25;
    pointer-events: none;
  }*/
  .day-wrapper.is-off .input-group input,
  .day-wrapper.is-off .input-group label {
    opacity: 0.25;
    pointer-events: none;
  }

  .input-group input[type="number"] {
    width: 80px;
  }

  .off-toggle {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
  }

  .off-toggle label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .toggle-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .toggle-btn.day-off {
    background: rgba(239,68,68,0.1);
    border-color: rgba(239,68,68,0.3);
    color: #ef4444;
  }

  .day-result {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    text-align: right;
    min-width: 140px;
  }

  .day-result .hours-normal { color: var(--normal); }
  .day-result .hours-night { color: var(--accent3); }
  .day-result .hours-weekend { color: var(--weekend); }
  .day-result .hours-total {
    font-size: 1rem;
    font-weight: 500;
    color: var(--text);
    display: block;
    margin-bottom: 2px;
  }
  .day-result .breakdown {
    font-size: 0.7rem;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .lunch-warning {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    font-weight: bold;
    color:#fff;
    background: #e02929;
    padding: 8px 24px 10px 24px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .lunch-add-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    align-self: flex-end;
    margin: 0px 24px 0 -10px;
    margin-bottom: 8px;
  }

  .lunch-add-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .lunch-add-btn.remove {
    border-color: rgba(239,68,68,0.4);
    color: #ef4444;
  }

  .lunch-add-btn.remove:hover {
    background: rgba(239,68,68,0.1);
  }

  .lunch-group {
    display: inline-flex;
    flex-direction: column;
    gap: 6px;
  }

  .lunch-row {
    display: inline-flex;
    gap: 7px;
    align-items: flex-end;
  }

  .week-summary {
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 20px 24px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
  }

  .summary-stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .summary-stat .label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text);
  }

  .summary-stat .value {
    font-size: 1.5rem;
    font-weight: 800;
    font-family: 'DM Mono', monospace;
  }

  .summary-stat.total .value { color: var(--accent); }
  .summary-stat.night .value { color: var(--accent3); }
  .summary-stat.weekend .value { color: var(--weekend); }
  .summary-stat.effective .value { color: var(--text); }

  .actions {
    display: flex;
    gap: 12px;
    margin-top: 32px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    padding: 14px 28px;
    border-radius: 10px;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }

  .btn-primary:hover {
    background: #13362f;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(0, 229, 191, 0.126);
  }

  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .midnight-note {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent3);
    margin-top: 2px;
  }

  .rota-summary {
    margin-top: 32px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .rota-summary-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .rota-summary-header h2 {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--bg);
    font-family: 'DM Mono', monospace;
  }

  .rota-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 0;
  }

  .rota-stat {
    padding: 24px;
    border-right: 1px solid var(--border);
  }

  .rota-stat:last-child { border-right: none; }

  .rota-stat .label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .rota-stat .value {
    font-size: 2rem;
    font-weight: 800;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
  }

  .rota-stat .sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .btn-print {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    padding: 14px 28px;
    border-radius: 10px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--accent3);
    border-color: var(--accent3);
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .btn-print:hover {
    background: rgba(167,139,250,0.1);
  }

  /* ===== PRINT STYLES ===== */
  @media print {
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

    body {
      background: #fff;
      color: #000;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      padding: 0;
    }

    .app > header,
    .weeks-container,
    .actions,
    .rota-summary,
    .app > div:first-of-type,
    footer {
      display: none !important;
    }

    .print-sheet {
      display: block !important;
    }

    .print-sheet {
      padding: 20px;
    }
  }

  .print-sheet { display: none; }
    .day-row {
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .day-result { text-align: left; }
    .time-inputs { gap: 8px; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>ERYC Rota Calculator</h1>
    <p>// shift hours · night &amp; weekend enhancements · midnight splits</p>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--normal)"></div>Standard hours</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent3)"></div>Night (8pm–6am) +33%</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--weekend)"></div>Weekend +50%</div>
    </div>
  </header>

  <div style="display:flex; gap:16px; margin-bottom:32px; flex-wrap:wrap;">
    <div class="input-group">
      <label>Employee Name</label>
      <input type="text" id="employeeName" placeholder="e.g. Jane Smith" style="width:220px;">
    </div>
    <div class="input-group">
      <label>Rota Start Date</label>
      <input type="date" id="rotaStartDate" style="width:180px;">
    </div>
  </div>

  <div class="weeks-container" id="weeksContainer"></div>

  <div class="actions">
    <button class="btn btn-primary" onclick="addWeek()">+ Add Week</button>
    <button class="btn btn-secondary" onclick="exportCSV()">⬇ Download CSV</button>
    <button class="btn btn-secondary" onclick="document.getElementById('csvUpload').click()">⬆ Upload CSV</button>
    <button class="btn btn-print" onclick="printSummary()">🖨 Print Summary</button>
    <input type="file" id="csvUpload" accept=".csv" style="display:none" onchange="handleCSVUpload(event)">
  </div>

  <div class="rota-summary" id="rotaSummary" style="display:none">
    <div class="rota-summary-header"><h2>Rota Totals</h2></div>
    <div class="rota-grid" id="rotaGrid"></div>
    <div style="padding: 24px; border-top: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr; gap: 16px;" id="rotaAllowances"></div>
  </div>

  <footer style="margin-top: 48px; padding-top: 16px; border-top: 1px solid var(--border); text-align: center;">
    <p style="font-size: 0.75rem; color: var(--text-muted);">
      © 2026 <strong>C Woods</strong>. All rights reserved. Unauthorised copying, modification or distribution of this tool is prohibited.
    </p>
  </footer>

  <!-- PRINT SHEET -->
  <div class="print-sheet" id="printSheet"></div>
</div>

<script>
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const WEEKEND = ['Saturday','Sunday'];
const NIGHT_START = 20; // 8pm
const NIGHT_END = 6;    // 6am
const NIGHT_RATE = 1/3;   // time and a third
const WEEKEND_RATE = 0.5; // time and a half

let weeks = [];
let weekCount = 0;

function addWeek() {
  weekCount++;
  const id = weekCount;
  const weekData = {
    id,
    days: DAYS.map(d => ({ name: d, start: '', lunchStart: '', lunchMins: 30,  lunch2Start: '', lunch2Mins: 0, end: '', dayOff: false }))
  };
  weeks.push(weekData);
  //renderWeek(weekData);
  rerenderAllWeeks();
  calculate();
}

function renderWeek(week) {
  const container = document.getElementById('weeksContainer');
  const card = document.createElement('div');
  card.className = 'week-card';
  card.id = `week-${week.id}`;

  const canRemove = weeks.length > 1;
  const weekIndex = weeks.findIndex(w => w.id === week.id);
  card.innerHTML = `
    <div class="week-header">
      <h2>Week ${week.label ||week.id}</h2>
      <div style="display:flex; gap:8px; align-items:center;">
        ${weekIndex > 0 ? `<button class="btn-remove-week" style="background:#1d4ed8;" onclick="moveWeek(${week.id}, -1)">▲ Move Up</button>` : ''}
        ${weekIndex < weeks.length - 1 ? `<button class="btn-remove-week" style="background:#1d4ed8;" onclick="moveWeek(${week.id}, 1)">▼ Move Down</button>` : ''}
        ${canRemove ? `<button class="btn-remove-week" onclick="removeWeek(${week.id})">Remove Week</button>` : ''}
      </div>
    </div>
    <div class="days-grid" id="days-${week.id}">
      ${week.days.map((day, i) => renderDay(week.id, day, i)).join('')}
    </div>
    <div class="week-summary" id="summary-${week.id}">
      <div class="summary-stat total"><div class="label">Total Hours</div><div class="value" id="wk-total-${week.id}">—</div></div>
      <div class="summary-stat night"><div class="label">Night Hours</div><div class="value" id="wk-night-${week.id}">—</div></div>
      <div class="summary-stat weekend"><div class="label">Weekend Hours</div><div class="value" id="wk-weekend-${week.id}">—</div></div>
      <div class="summary-stat effective"><div class="label">Effective Hours</div><div class="value" id="wk-effective-${week.id}">—</div></div>
    </div>
  `;
  container.appendChild(card);
}

function renderDay(weekId, day, idx) {
  const isWeekend = WEEKEND.includes(day.name);
  const hasLunch2 = day.lunch2Start || day.lunch2Mins > 0;
  return `
    <div class="day-wrapper ${day.dayOff ? 'is-off' : ''}" id="row-${weekId}-${idx}">
      <div class="day-row ${isWeekend ? 'is-weekend' : ''}">
        <div class="day-label ${isWeekend ? 'is-weekend' : ''}">${day.name}</div>
        <div class="time-inputs" id="inputs-${weekId}-${idx}">
          <div class="input-group">
            <label>Start</label>
            <input type="time" value="${day.start}" onchange="updateDay(${weekId},${idx},'start',this.value)" ${day.dayOff ? 'disabled' : ''}>
          </div>

          <div class="lunch-group">
            <div class="lunch-row">
              <div class="input-group">
                <label>Lunch Start</label>
                <input type="time" value="${day.lunchStart}" onchange="updateDay(${weekId},${idx},'lunchStart',this.value)" ${day.dayOff ? 'disabled' : ''}>
              </div>
              <div class="input-group">
                <label>Lunch (mins)</label>
                <input type="number" min="0" max="120" value="${day.lunchMins}" onchange="updateDay(${weekId},${idx},'lunchMins',this.value)" ${day.dayOff ? 'disabled' : ''}>
              </div>
              ${!day.dayOff && !hasLunch2 ? `
                <button class="lunch-add-btn" onclick="addLunch2(${weekId},${idx})" title="Add 2nd lunch">+</button>
              ` : ''}
            </div>

            ${hasLunch2 ? `
            <div class="lunch-row">
              <div class="input-group">
                <label>2nd Lunch Start</label>
                <input type="time" value="${day.lunch2Start}" onchange="updateDay(${weekId},${idx},'lunch2Start',this.value)" ${day.dayOff ? 'disabled' : ''}>
              </div>
              <div class="input-group">
                <label>2nd Lunch (mins)</label>
                <div style="display:flex; gap:18px; align-items:center;">
                  <input type="number" min="0" max="120" value="${day.lunch2Mins}" onchange="updateDay(${weekId},${idx},'lunch2Mins',this.value)" ${day.dayOff ? 'disabled' : ''}>
                      ${!day.dayOff ? `<button class="lunch-add-btn remove" onclick="removeLunch2(${weekId},${idx})" title="Remove 2nd lunch">✕</button>` : ''}
                  </div>
                </div>
              
            </div>
            ` : ''}
          </div>

          <div class="input-group">
            <label>End</label>
            <input type="time" value="${day.end}" onchange="updateDay(${weekId},${idx},'end',this.value)" ${day.dayOff ? 'disabled' : ''}>
          </div>
          <div class="off-toggle">
            <label>Status</label>
            <button class="toggle-btn ${day.dayOff ? 'day-off' : ''}" onclick="toggleDayOff(${weekId},${idx})">${day.dayOff ? 'Day Off' : 'Working'}</button>
          </div>
        </div>
        <div class="day-result" id="result-${weekId}-${idx}"><span class="breakdown" style="color:var(--text-muted)">Enter times</span></div>
      </div>
      <div class="lunch-warning" id="lunch-warn-${weekId}-${idx}" style="display:none">⚠ Shift exceeds 5 hours — lunch start time or duration missing</div>
    </div>
  `;
}

function updateDay(weekId, dayIdx, field, value) {
  const week = weeks.find(w => w.id === weekId);
  if (!week) return;

  // For time fields, check the input's validity directly
  if (field === 'start' || field === 'end' || field === 'lunchStart' || field === 'lunch2Start') {
    // Find the input element and check validity
    const row = document.getElementById(`row-${weekId}-${dayIdx}`);
    if (row) {
      const inputs = row.querySelectorAll('input[type="time"]');
      inputs.forEach(input => {
        if (input.value === '' || input.validity.valid) {
          input.style.borderColor = '';
          input.removeAttribute('title');
        }
      });
    }
    // If value is non-empty but invalid, the browser will have passed '' — so just store it
    week.days[dayIdx][field] = value;
  } else {
    week.days[dayIdx][field] = field === 'lunchMins' || field === 'lunch2Mins' ? parseInt(value) || 0 : value;
  }

  calculate();
}

/* Broken when weeks became movable
function toggleDayOff(weekId, dayIdx) {
  const week = weeks.find(w => w.id === weekId);
  if (!week) return;
  week.days[dayIdx].dayOff = !week.days[dayIdx].dayOff;
  // Re-render the row
  const row = document.getElementById(`row-${weekId}-${dayIdx}`);
  const day = week.days[dayIdx];
  const isWeekend = WEEKEND.includes(day.name);
  row.outerHTML = renderDay(weekId, day, dayIdx).replace('<div class="day-row', `<div class="day-row`);
  // Simpler: just re-render the whole week

// Parse "HH:MM" to minutes since midnight
function parseTime(t) {
  if (!t) return null;
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function fmtHours(mins) {
  if (mins === null || isNaN(mins)) return '—';
  const h = Math.floor(mins / 60);
  const m = Math.round(mins % 60);
  return m > 0 ? `${h}h ${m}m` : `${h}h`;
}

// Given a segment [startMins, endMins] on a given dayName (0=Mon..6=Sun in week),
// returns { normal, night, weekend } minutes
// dayIndex: 0=Monday ... 6=Sunday
function classifySegment(startMins, endMins, dayIndex) {
  // startMins and endMins are minutes within a single calendar day (0–1439)
  const dayName = DAYS[dayIndex];
  const isWeekend = WEEKEND.includes(dayName);

  let normal = 0, night = 0, weekend = 0;
  const duration = endMins - startMins;
  if (duration <= 0) return { normal, night, weekend };

  // Night window: 20*60 to 6*60 (next day = 1440+360 = 1800, but we're within one day)
  // Night within a day: [0, 360] and [1200, 1440)
  // We'll iterate minute by minute is too slow; instead split at boundaries
  const boundaries = [0, NIGHT_END * 60, NIGHT_START * 60, 24 * 60];
  // Night zones within a single day: 0–360 (6am) and 1200–1440 (8pm)
  
  function isNightMinute(m) {
    return m < NIGHT_END * 60 || m >= NIGHT_START * 60;
  }

  // Split segment at boundaries
  const pts = [startMins];
  for (const b of [NIGHT_END * 60, NIGHT_START * 60]) {
    if (b > startMins && b < endMins) pts.push(b);
  }
  pts.push(endMins);

  for (let i = 0; i < pts.length - 1; i++) {
    const segStart = pts[i];
    const segEnd = pts[i + 1];
    const segMins = segEnd - segStart;
    const midpoint = (segStart + segEnd) / 2;
    const nightSeg = isNightMinute(midpoint);

    if (isWeekend) {
      weekend += segMins;
    } else if (nightSeg) {
      night += segMins;
    } else {
      normal += segMins;
    }
  }

  return { normal, night, weekend };
}


// Calculate a single day's shift, handling midnight crossover
// Returns array of { dayIndex, normal, night, weekend, totalWorked } — one entry per calendar day touched
function calcShift(dayIndex, startStr, lunchStartStr, lunchMins, endStr, lunch2StartStr, lunch2Mins) {
  const start = parseTime(startStr);
  let end = parseTime(endStr);
  if (start === null || end === null) return null;

  const crossesMidnight = end <= start;
  if (crossesMidnight) end += 24 * 60;

  const MIDNIGHT = 24 * 60;

  function buildSegments(shiftStart, shiftEnd, lunches) {
    // lunches: array of { lunchStart (parsed mins), lunchMins }
    // Sort lunch breaks by start time, adjust for midnight crossover, then cut them out
    let cuts = [];
    for (const { lunchStartParsed, mins } of lunches) {
      if (lunchStartParsed === null || mins <= 0) continue;
      let ls = lunchStartParsed;
      if (crossesMidnight && ls <= (shiftEnd - MIDNIGHT)) ls += MIDNIGHT;
      const le = ls + mins;
      if (ls >= shiftStart && le <= shiftEnd) cuts.push([ls, le]);
    }
    cuts.sort((a, b) => a[0] - b[0]);

    let segs = [];
    let cursor = shiftStart;
    for (const [ls, le] of cuts) {
      if (ls > cursor) segs.push([cursor, ls]);
      cursor = le;
    }
    if (cursor < shiftEnd) segs.push([cursor, shiftEnd]);
    return segs;
  }

  const lunch1Parsed = parseTime(lunchStartStr);
  const lunch2Parsed = parseTime(lunch2StartStr);
  const segments = buildSegments(start, end, [
    { lunchStartParsed: lunch1Parsed, mins: lunchMins },
    { lunchStartParsed: lunch2Parsed, mins: lunch2Mins || 0 }
  ]);

  let dayResults = {};

  function addToDay(dIdx, n, ni, w) {
    const key = ((dIdx % 7) + 7) % 7;
    if (!dayResults[key]) dayResults[key] = { normal: 0, night: 0, weekend: 0 };
    dayResults[key].normal += n;
    dayResults[key].night += ni;
    dayResults[key].weekend += w;
  }

  for (const [s, e] of segments) {
    if (!crossesMidnight || e <= MIDNIGHT) {
      const { normal, night, weekend } = classifySegment(s, e, dayIndex);
      addToDay(dayIndex, normal, night, weekend);
    } else {
      if (s < MIDNIGHT) {
        const { normal, night, weekend } = classifySegment(s, MIDNIGHT, dayIndex);
        addToDay(dayIndex, normal, night, weekend);
      }
      const nextDayStart = Math.max(s, MIDNIGHT) - MIDNIGHT;
      const nextDayEnd = e - MIDNIGHT;
      const nextDayIndex = (dayIndex + 1) % 7;
      const { normal, night, weekend } = classifySegment(nextDayStart, nextDayEnd, nextDayIndex);
      addToDay(nextDayIndex, normal, night, weekend);
    }
  }

  return { dayResults, crossesMidnight };
}

function calculate() {
  let rotaNormal = 0, rotaNight = 0, rotaWeekend = 0;

  // First pass: calculate each week's dayTotals and collect Sunday overflows
  const allDayTotals = [];
  const sundayOverflows = [];

  for (const week of weeks) {
    let dayTotals = {};
    DAYS.forEach((_, i) => { dayTotals[i] = { normal: 0, night: 0, weekend: 0 }; });
    let sundayOverflow = { normal: 0, night: 0, weekend: 0 };

    for (let i = 0; i < week.days.length; i++) {
      const day = week.days[i];
      if (day.dayOff) continue;
      const result = calcShift(i, day.start, day.lunchStart, parseInt(day.lunchMins) || 0, day.end, day.lunch2Start, parseInt(day.lunch2Mins) || 0);
      if (!result) continue;

      for (const [dIdx, vals] of Object.entries(result.dayResults)) {
        const idx = parseInt(dIdx);
        if (i === 6 && idx === 0) {
          // Sunday overnight — save overflow separately
          sundayOverflow.normal += vals.normal;
          sundayOverflow.night += vals.night;
          sundayOverflow.weekend += vals.weekend;
        } else {
          dayTotals[idx].normal += vals.normal;
          dayTotals[idx].night += vals.night;
          dayTotals[idx].weekend += vals.weekend;
        }
      }
    }

    allDayTotals.push(dayTotals);
    sundayOverflows.push(sundayOverflow);
  }

  // Second pass: apply each week's Sunday overflow to the NEXT week's Monday
  // Last week's overflow loops back to week 1 Monday
  for (let w = 0; w < weeks.length; w++) {
    const overflow = sundayOverflows[w];
    const targetWeek = (w + 1) % weeks.length;
    allDayTotals[targetWeek][0].normal += overflow.normal;
    allDayTotals[targetWeek][0].night += overflow.night;
    allDayTotals[targetWeek][0].weekend += overflow.weekend;
  }

  // Now render using the corrected dayTotals
  for (let wi = 0; wi < weeks.length; wi++) {
    const week = weeks[wi];
    const dayTotals = allDayTotals[wi];

    for (let i = 0; i < week.days.length; i++) {
      const day = week.days[i];
      const el = document.getElementById(`result-${week.id}-${i}`);
      if (!el) continue;

      if (day.dayOff) {
        const t = dayTotals[i];
        const overflowTotal = t.normal + t.night + t.weekend;
        if (overflowTotal > 0) {
          let breakdown = [];
          if (t.normal > 0) breakdown.push(`<span class="hours-normal">${fmtHours(t.normal)} standard</span>`);
          if (t.night > 0) breakdown.push(`<span class="hours-night">${fmtHours(t.night)} night</span>`);
          if (t.weekend > 0) breakdown.push(`<span class="hours-weekend">${fmtHours(t.weekend)} weekend</span>`);
          el.innerHTML = `
            <span class="hours-total">${fmtHours(overflowTotal)}</span>
            <span class="breakdown">${breakdown.join('<br>')}</span>
            <div class="midnight-note">↪ overnight carry</div>
          `;
        } else {
          el.innerHTML = `<span class="breakdown" style="color:var(--text-muted)">Day off</span>`;
        }
        continue;
      }

      const t = dayTotals[i];
      const total = t.normal + t.night + t.weekend;
      const result = calcShift(i, day.start, day.lunchStart, parseInt(day.lunchMins) || 0, day.end, day.lunch2Start, parseInt(day.lunch2Mins) || 0);
      const hasMidnight = result && result.crossesMidnight;

      if (total === 0) {
        el.innerHTML = `<span class="breakdown" style="color:var(--text-muted)">Enter times</span>`;
        continue;
      }

      // Missing lunch warning: if shift > 5 hours and no lunch mins, show warning
      const start = parseTime(day.start);
      const rawEnd = parseTime(day.end);
      let shiftSpanMins = 0;
      if (start !== null && rawEnd !== null) {
        shiftSpanMins = rawEnd <= start ? (rawEnd + 1440) - start : rawEnd - start;
      }
      const missingLunch = shiftSpanMins > 300 && (!day.lunchStart || !(parseInt(day.lunchMins) > 0));

      // Check if any lunch falls outside the shift window
      let lunchOutside = false;
      let lunchWarningMsg = '⚠ Shift exceeds 5 hours — lunch start time or duration missing';
      
      const crossesMidnightShift = rawEnd !== null && start !== null && rawEnd <= start;
      const shiftEndMins = rawEnd !== null && start !== null ? (crossesMidnightShift ? rawEnd + 1440 : rawEnd) : null;

      function checkLunchOutside(lunchStartStr, lunchMinsVal) {
        if (!lunchStartStr || start === null || shiftEndMins === null) return false;
        let ls = parseTime(lunchStartStr);
        if (crossesMidnightShift && ls < start) ls += 1440;
        const le = ls + (parseInt(lunchMinsVal) || 0);
        return ls < start || le > shiftEndMins;
      }

      if (checkLunchOutside(day.lunchStart, day.lunchMins)) lunchOutside = true;
      if (checkLunchOutside(day.lunch2Start, day.lunch2Mins)) lunchOutside = true;

      if (lunchOutside) lunchWarningMsg = '⚠ A lunch break falls outside the shift start/end times';
      if (missingLunch && lunchOutside) lunchWarningMsg = '⚠ Missing lunch break · a lunch also falls outside shift times';

      const warnEl = document.getElementById(`lunch-warn-${week.id}-${i}`);
      if (warnEl) {
        const show = missingLunch || lunchOutside;
        warnEl.style.display = show ? 'flex' : 'none';
        if (show) warnEl.textContent = lunchWarningMsg;
      }


      let breakdown = [];
      if (t.normal > 0) breakdown.push(`<span class="hours-normal">${fmtHours(t.normal)} standard</span>`);
      if (t.night > 0) breakdown.push(`<span class="hours-night">${fmtHours(t.night)} night</span>`);
      if (t.weekend > 0) breakdown.push(`<span class="hours-weekend">${fmtHours(t.weekend)} weekend</span>`);

      el.innerHTML = `
        <span class="hours-total">${fmtHours(total)}</span>
        <span class="breakdown">${breakdown.join('<br>')}</span>
        ${hasMidnight ? `<div class="midnight-note">↪ crosses midnight</div>` : ''}
      `;
    }

    let wkNormal = 0, wkNight = 0, wkWeekend = 0;
    for (let i = 0; i < 7; i++) {
      wkNormal += dayTotals[i].normal;
      wkNight += dayTotals[i].night;
      wkWeekend += dayTotals[i].weekend;
    }
    const wkTotal = wkNormal + wkNight + wkWeekend;
    const wkEffective = wkNormal + wkNight * (1 + NIGHT_RATE) + wkWeekend * (1 + WEEKEND_RATE);

    const setEl = (id, val) => { const e = document.getElementById(id); if (e) e.textContent = val; };
    setEl(`wk-total-${week.id}`, fmtHours(wkTotal));
    setEl(`wk-night-${week.id}`, fmtHours(wkNight));
    setEl(`wk-weekend-${week.id}`, fmtHours(wkWeekend));
    setEl(`wk-effective-${week.id}`, fmtHours(wkEffective));

    rotaNormal += wkNormal;
    rotaNight += wkNight;
    rotaWeekend += wkWeekend;
  }

  // Rota summary
  const rotaSummary = document.getElementById('rotaSummary');
  if (weeks.length > 1) {
    rotaSummary.style.display = 'block';
    const rotaTotal = rotaNormal + rotaNight + rotaWeekend;
    const rotaEffective = rotaNormal + rotaNight * (1 + NIGHT_RATE) + rotaWeekend * (1 + WEEKEND_RATE);
    const avgWeekly = weeks.length > 0 ? (rotaTotal / 60 / weeks.length).toFixed(2) : '—';
    document.getElementById('rotaGrid').innerHTML = `
      <div class="rota-stat"><div class="label">Total Hours</div><div class="value">${fmtHours(rotaTotal)}</div><div class="sub">across ${weeks.length} weeks</div></div>
      <div class="rota-stat"><div class="label">Night Hours</div><div class="value" style="color:var(--accent3)">${fmtHours(rotaNight)}</div><div class="sub">+33% enhancement</div></div>
      <div class="rota-stat"><div class="label">Weekend Hours</div><div class="value" style="color:var(--weekend)">${fmtHours(rotaWeekend)}</div><div class="sub">+50% enhancement</div></div>
      <div class="rota-stat"><div class="label">Effective Hours</div><div class="value" style="color:var(--text)">${fmtHours(rotaEffective)}</div><div class="sub">with enhancements applied</div></div>
      <div class="rota-stat"><div class="label">Avg Weekly Hours</div><div class="value" style="color:var(--accent2)">${avgWeekly}</div><div class="sub">decimal hours per week</div></div>
    `;
    document.getElementById('rotaAllowances').innerHTML = `
      <div>
        <div style="font-family:'DM Mono',monospace; font-size:0.65rem; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:8px;">Night Allowance (Time + ⅓)</div>
        <div style="font-size:1.8rem; font-weight:800; font-family:'DM Mono',monospace; color:var(--accent3);">${calcAllowance(rotaNight, weeks.length)}</div>
        <div style="font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--text-muted); margin-top:4px;">${fmtHours(rotaNight)} night hrs · (hrs ÷ weeks) × (52.143 ÷ 12)</div>
      </div>
      <div>
        <div style="font-family:'DM Mono',monospace; font-size:0.65rem; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:8px;">Weekend Allowance (Time + ½)</div>
        <div style="font-size:1.8rem; font-weight:800; font-family:'DM Mono',monospace; color:var(--weekend);">${calcAllowance(rotaWeekend, weeks.length)}</div>
        <div style="font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--text-muted); margin-top:4px;">${fmtHours(rotaWeekend)} weekend hrs · (hrs ÷ weeks) × (52.143 ÷ 12)</div>
      </div>
    `;
  } else {
    rotaSummary.style.display = 'none';
  }
}

function calcAllowance(totalHours, numWeeks) {
  // ((hours / weeks) * (52.143 / 12)) rounded to 2dp
  if (!numWeeks) return '—';
  return ((totalHours / 60 / numWeeks) * (52.143 / 12)).toFixed(2);
}

function buildWeekData() {
  let rotaNormal = 0, rotaNight = 0, rotaWeekend = 0;

  const allDayTotals = [];
  const sundayOverflows = [];
  const weekRowsBase = [];

  weeks.forEach(week => {
    let dayTotals = {};
    DAYS.forEach((_, i) => { dayTotals[i] = { normal: 0, night: 0, weekend: 0 }; });
    let sundayOverflow = { normal: 0, night: 0, weekend: 0 };

    for (let i = 0; i < week.days.length; i++) {
      const day = week.days[i];
      if (day.dayOff) continue;
      const result = calcShift(i, day.start, day.lunchStart, parseInt(day.lunchMins) || 0, day.end, day.lunch2Start, parseInt(day.lunch2Mins) || 0);
      if (!result) continue;
      for (const [dIdx, vals] of Object.entries(result.dayResults)) {
        const idx = parseInt(dIdx);
        if (i === 6 && idx === 0) {
          sundayOverflow.normal += vals.normal;
          sundayOverflow.night += vals.night;
          sundayOverflow.weekend += vals.weekend;
        } else {
          dayTotals[idx].normal += vals.normal;
          dayTotals[idx].night += vals.night;
          dayTotals[idx].weekend += vals.weekend;
        }
      }
    }

    allDayTotals.push(dayTotals);
    sundayOverflows.push(sundayOverflow);
    weekRowsBase.push({ week });
  });

  // Apply Sunday overflows to next week's Monday, last week loops to first
  for (let w = 0; w < weeks.length; w++) {
    const overflow = sundayOverflows[w];
    const targetWeek = (w + 1) % weeks.length;
    allDayTotals[targetWeek][0].normal += overflow.normal;
    allDayTotals[targetWeek][0].night += overflow.night;
    allDayTotals[targetWeek][0].weekend += overflow.weekend;
  }

  // Now tally up totals per week using the finalised allDayTotals
  const weekRows = weekRowsBase.map(({ week }, wi) => {
    const dayTotals = allDayTotals[wi];
    let wkNormal = 0, wkNight = 0, wkWeekend = 0;
    for (let i = 0; i < 7; i++) {
      wkNormal += dayTotals[i].normal;
      wkNight += dayTotals[i].night;
      wkWeekend += dayTotals[i].weekend;
    }
    rotaNormal += wkNormal;
    rotaNight += wkNight;
    rotaWeekend += wkWeekend;
    return { week, dayTotals, wkNormal, wkNight, wkWeekend };
  });

  return { weekRows, rotaNormal, rotaNight, rotaWeekend };
}

function escapeHTML(str) {
  return str.replace(/[&<>"']/g, m => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  })[m]);
}

    return weekRows.reduce((sum, { dayTotals }) => {
      const t = dayTotals[di];
      return sum + t.normal + t.night + t.weekend;
    }, 0);
  });

  // Total hours across all weeks row
  page1 += `<tr class="totals-row">
    <td class="left" colspan="8">Total Hours</td>
    <td><strong>${fmtHours(rotaTotal)}</strong></td>
  </tr>`;

  // Average row
 page1 += `<tr class="avg-row">
    <td class="left" colspan="8">Average Weekly Hours</td>
    <td><strong>${(rotaTotal / 60 / numWeeks).toFixed(2)} hrs</strong></td>
  </tr>`;

  page1 += `</tbody></table>`;

  // Allowance calculations
  page1 += `
    <div class="section-title">Enhancement Allowances</div>
    <div class="allowance-box">
      <div class="allowance-cell">
        <div class="a-label">Night Allowance (Time + ⅓)</div>
        <div class="a-value">${nightAllowance}</div>
        <div class="a-sub">${fmtHours(rotaNight)} night hrs over ${numWeeks} wk${numWeeks!==1?'s':''} · formula: (hrs ÷ weeks) × (52.143 ÷ 12)</div>
      </div>
      <div class="allowance-cell">
        <div class="a-label">Weekend Allowance (Time + ½)</div>
        <div class="a-value">${weekendAllowance}</div>
        <div class="a-sub">${fmtHours(rotaWeekend)} weekend hrs over ${numWeeks} wk${numWeeks!==1?'s':''} · formula: (hrs ÷ weeks) × (52.143 ÷ 12)</div>
      </div>
    </div>
  `;

  // ── PAGE 2: Detailed breakdown ─────────────────────────────────────
  let page2 = `<div class="page-break">`;

  page2 += `
    <div class="ps-title">Detailed Shift Breakdown</div>
    <div class="ps-sub">
      <strong>Employee:</strong> ${employeeName} &nbsp;·&nbsp;
      <strong>Rota Start:</strong> ${rotaStartDate} &nbsp;·&nbsp;
      Generated ${new Date().toLocaleDateString('en-GB', {weekday:'long', year:'numeric', month:'long', day:'numeric'})}
    </div>

    <div class="info-grid">
      <div class="info-cell"><div class="i-label">Total Hours</div><div class="i-value">${fmtHours(rotaTotal)}</div><div class="i-sub">across ${numWeeks} week${numWeeks!==1?'s':''}</div></div>
      <div class="info-cell"><div class="i-label">Night Hours</div><div class="i-value">${fmtHours(rotaNight)}</div><div class="i-sub">+33% enhancement</div></div>
      <div class="info-cell"><div class="i-label">Weekend Hours</div><div class="i-value">${fmtHours(rotaWeekend)}</div><div class="i-sub">+50% enhancement</div></div>
      <div class="info-cell"><div class="i-label">Effective Hours</div><div class="i-value">${fmtHours(rotaEffective)}</div><div class="i-sub">with enhancements</div></div>
    </div>
  `;

  weekRows.forEach(({ week, dayTotals, wkNormal, wkNight, wkWeekend }) => {
    const wkTotal = wkNormal + wkNight + wkWeekend;
    page2 += `
      <div class="section-title">Week ${week.id}</div>
      <table>
        <thead>
          <tr>
            <th class="left">Day</th>
            <th>Start</th><th>Lunch</th><th>End</th>
            <th>Standard</th><th>Night</th><th>Weekend</th><th>Total</th>
          </tr>
        </thead>
        <tbody>
    `;
    week.days.forEach((day, i) => {
      const isWeekend = WEEKEND.includes(day.name);
      if (day.dayOff) {
        const t = dayTotals[i];
        const overflowTotal = t.normal + t.night + t.weekend;
        if (overflowTotal > 0) {
          page2 += `<tr>
            <td class="left">${day.name} <em style="color:#aaa;font-size:9px">(day off)</em></td>
            <td colspan="3" style="color:#aaa;font-style:italic">overnight carry</td>
            <td>${t.normal > 0 ? fmtHours(t.normal) : '—'}</td>
            <td>${t.night > 0 ? fmtHours(t.night) : '—'}</td>
            <td>${t.weekend > 0 ? fmtHours(t.weekend) : '—'}</td>
            <td><strong>${fmtHours(overflowTotal)}</strong></td>
          </tr>`;
        } else {
          page2 += `<tr><td class="left">${day.name}</td><td colspan="7" style="color:#aaa;font-style:italic">Day Off</td></tr>`;
        }
        return;
      }
      const t = dayTotals[i];
      const total = t.normal + t.night + t.weekend;
      const lunchStr = day.lunchStart ? `${day.lunchStart} (${day.lunchMins}m)` : '—';
      page2 += `<tr class="${isWeekend ? 'weekend-row' : ''}">
        <td class="left">${day.name}</td>
        <td>${day.start || '—'}</td>
        <td>${lunchStr}</td>
        <td>${day.end || '—'}</td>
        <td>${t.normal > 0 ? fmtHours(t.normal) : '—'}</td>
        <td>${t.night > 0 ? fmtHours(t.night) : '—'}</td>
        <td>${t.weekend > 0 ? fmtHours(t.weekend) : '—'}</td>
        <td><strong>${total > 0 ? fmtHours(total) : '—'}</strong></td>
      </tr>`;
    });
    page2 += `<tr class="totals-row">
      <td class="left" colspan="4">Week ${week.id} Totals</td>
      <td>${fmtHours(wkNormal)}</td>
      <td>${fmtHours(wkNight)}</td>
      <td>${fmtHours(wkWeekend)}</td>
      <td>${fmtHours(wkTotal)}</td>
    </tr></tbody></table>`;
  });

  page2 += `</div>`;

  document.getElementById('printSheet').innerHTML = sharedStyles + page1 + page2;
  window.print();
}

function exportCSV() {
  if (!validateBeforeAction('download')) return;

  const { weekRows, rotaNormal, rotaNight, rotaWeekend } = buildWeekData();
  const numWeeks = weeks.length;
  const rotaTotal = rotaNormal + rotaNight + rotaWeekend;
  const nightAllowance = calcAllowance(rotaNight, numWeeks);
  const weekendAllowance = calcAllowance(rotaWeekend, numWeeks);
  const avgWeekly = numWeeks > 0 ? (rotaTotal / 60 / numWeeks).toFixed(2) : '0.00';
  const empName = document.getElementById('employeeName').value.trim();

  const rows = [];
  rows.push('ERYC Work Pattern');
  // Human-readable summary block — prefixed with # so they're clearly non-data
  if (empName) rows.push(`# Employee: ${empName}`);
  rows.push(`# Total Hours: ${fmtHours(rotaTotal)} across ${numWeeks} week${numWeeks !== 1 ? 's' : ''}`);
  rows.push(`# Average Weekly Hours: ${avgWeekly} hrs`);
  rows.push(`# Night Enhancement Allowance: ${nightAllowance}`);
  rows.push(`# Weekend Enhancement Allowance: ${weekendAllowance}`);
  rows.push(`# Generated: ${new Date().toLocaleDateString('en-GB', {weekday:'long', year:'numeric', month:'long', day:'numeric'})}`);
  rows.push('# --- Rota Data Below --- Do not edit the following lines ---');
  rows.push('week,day,start,lunchStart,lunchMins,lunch2Start,lunch2Mins,end,dayOff');

  weeks.forEach((week, wi) => {
    week.days.forEach(day => {
      rows.push([
        wi + 1,
        day.name,
        day.start || '',
        day.lunchStart || '',
        day.lunchMins ?? 30,
        day.lunch2Start || '',
        day.lunch2Mins ?? 0,
        day.end || '',
        day.dayOff ? 'true' : 'false'
      ].join(','));
    });
  });

  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const safeName = empName.replace(/[^a-z0-9]/gi, '_') || 'rota';
  a.download = `ERYC_${safeName}_rota.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function handleCSVUpload(event) {
  const file = event.target.files[0];
  event.target.value = ''; // reset so same file can be re-uploaded
  if (!file) return;

  // Validation a: file extension
  if (!file.name.toLowerCase().endsWith('.csv')) {
    alert('Invalid file type. Please upload a .csv file.');
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result.trim();
    const lines = text.split(/\r?\n/);

    // Validation b: compatibility marker on line 1
    if (lines[0].trim() !== 'ERYC Work Pattern') {
      alert('Incompatible file.\n\nThis CSV was not exported from the ERYC Rota Calculator. The file must begin with "ERYC Work Pattern" on the first line.');
      return;
    }

    // Expect header on line 2, data from line 3 onwards
    if (lines.length < 3) {
      alert('The CSV file appears to be empty or incomplete.');
      return;
    }

    const expectedHeader = 'week,day,start,lunchStart,lunchMins,lunch2Start,lunch2Mins,end,dayOff';

    // Skip comment lines (starting with #) to find the column header
    const headerLineIndex = lines.findIndex((l, idx) => idx > 0 && !l.trim().startsWith('#'));
    if (headerLineIndex === -1 || lines[headerLineIndex].trim() !== expectedHeader) {
      alert('CSV column headers do not match the expected format. The file may be from an older version or have been manually edited incorrectly.');
      return;
    }

    // Parse rows — everything after the header, skipping blanks and comments
    const dataLines = lines.slice(headerLineIndex + 1).filter(l => l.trim() !== '' && !l.trim().startsWith('#'));

    const newWeeks = [];
    let currentWeekNum = null;
    let currentWeek = null;
    let parseError = null;

    for (let i = 0; i < dataLines.length; i++) {
      const cols = dataLines[i].split(',');
      if (cols.length < 7) {
        parseError = `Row ${i + 3} has too few columns.`;
        break;
      }
      const [weekNum, dayName, start, lunchStart, lunchMins, lunch2Start, lunch2Mins, end, dayOff] = cols.map(c => c.trim());
      if (!DAYS.includes(dayName)) {
        parseError = `Row ${i + 3} contains an unrecognised day name: "${dayName}".`;
        break;
      }

      if (weekNum !== currentWeekNum) {
        if (currentWeek) newWeeks.push(currentWeek);
        weekCount++;
        currentWeek = {
          id: weekCount,
          days: DAYS.map(d => ({ name: d, start: '', lunchStart: '', lunchMins: 30, end: '', dayOff: false }))
        };
        currentWeekNum = weekNum;
      }

      const dayIndex = DAYS.indexOf(dayName);
      currentWeek.days[dayIndex] = {
        name: dayName,
        start: start || '',
        lunchStart: lunchStart || '',
        lunchMins: parseInt(lunchMins) || 30,
        lunch2Start: lunch2Start || '',
        lunch2Mins: parseInt(lunch2Mins) || 0,
        end: end || '',
        dayOff: dayOff === 'true'
      };
    }

    if (parseError) {
      alert('Error reading CSV:\n\n' + parseError + '\n\nImport cancelled.');
      return;
    }

    if (currentWeek) newWeeks.push(currentWeek);

    if (newWeeks.length === 0) {
      alert('No week data found in the CSV file.');
      return;
    }

    // Replace current data
    weeks = newWeeks;
    rerenderAllWeeks();
    calculate();
    alert(`Import successful! ${newWeeks.length} week${newWeeks.length !== 1 ? 's' : ''} loaded.`);
  };

  reader.onerror = function() {
    alert('Failed to read the file. Please try again.');
  };

  reader.readAsText(file);
}

function validateBeforeAction(actionName) {
  const problems = [];

  for (const week of weeks) {
    week.days.forEach((day, i) => {
      if (day.dayOff) return;

      // Check DOM inputs for badInput (partially typed but incomplete)
      const row = document.getElementById(`row-${week.id}-${i}`);
      if (row) {
        row.querySelectorAll('input[type="time"]').forEach(input => {
          if (input.validity.badInput) {
            const label = input.closest('.input-group')?.querySelector('label')?.textContent || 'time field';
            problems.push(`Week ${week.label || week.id}, ${day.name}: incomplete value in "${label.trim()}"`);
            input.style.borderColor = '#ef4444';
            input.style.boxShadow = '0 0 0 3px rgba(239,68,68,0.15)';
          }
        });
      }

      const hasStart = !!day.start;
      const hasEnd = !!day.end;
      const hasLunchStart = !!day.lunchStart;
      const hasLunchMins = parseInt(day.lunchMins) > 0;
      const hasLunch2Start = !!day.lunch2Start;
      const hasLunch2Mins = parseInt(day.lunch2Mins) > 0;

      if (hasStart && !hasEnd)
        problems.push(`Week ${week.label || week.id}, ${day.name}: has a start time but no end time`);
      if (!hasStart && hasEnd)
        problems.push(`Week ${week.label || week.id}, ${day.name}: has an end time but no start time`);

      // Lunch checks
      const start = parseTime(day.start);
      const rawEnd = parseTime(day.end);
      let shiftSpanMins = 0;
      if (start !== null && rawEnd !== null) {
        shiftSpanMins = rawEnd <= start ? (rawEnd + 1440) - start : rawEnd - start;
      }
      const shiftEnd = rawEnd !== null && start !== null ? (rawEnd <= start ? rawEnd + 1440 : rawEnd) : null;

      if (shiftSpanMins > 300 && (!day.lunchStart || !(parseInt(day.lunchMins) > 0)))
        problems.push(`Week ${week.label || week.id}, ${day.name}: shift exceeds 5 hours with no lunch break entered`);

      const crossesMidnight = rawEnd !== null && start !== null && rawEnd <= start;

      function lunchOutsideShift(lunchStartStr, lunchMinsVal) {
        if (!lunchStartStr || start === null || shiftEnd === null) return false;
        let ls = parseTime(lunchStartStr);
        // If shift crosses midnight and lunch time is earlier in the day than shift start,
        // it must be on the next calendar day — add 1440 to compare correctly
        if (crossesMidnight && ls < start) ls += 1440;
        const le = ls + (parseInt(lunchMinsVal) || 0);
        return ls < start || le > shiftEnd;
      }

      if (day.lunchStart && lunchOutsideShift(day.lunchStart, day.lunchMins))
        problems.push(`Week ${week.label || week.id}, ${day.name}: lunch break falls outside shift times`);

      if (day.lunch2Start && lunchOutsideShift(day.lunch2Start, day.lunch2Mins))
        problems.push(`Week ${week.label || week.id}, ${day.name}: 2nd lunch break falls outside shift times`);

    });
  }

  

  

  if (problems.length > 0) {
    alert(`Cannot ${actionName} — please fix the following before continuing:\n\n${problems.map(p => `• ${p}`).join('\n')}\n\nNote: times must be entered in full format in accordance to your system settings (eg. 16:00 or 4:00 PM).`);
    return false;
  }
  return true;
}
