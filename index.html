<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rota Hours Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f13;
    --surface: #16181f;
    --surface2: #1e2029;
    --border: #2a2d3a;
    --accent: #00e5c0;
    --accent2: #ff7b54;
    --accent3: #a78bfa;
    --text: #e8eaf0;
    --text-muted: #6b7280;
    --night: #4f46e5;
    --weekend: #f59e0b;
    --normal: #00e5c0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 40px 20px;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,229,192,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  .app {
    max-width: 960px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 48px;
  }

  header h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    margin-top: 10px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.5px;
  }

  .legend {
    display: flex;
    gap: 20px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
  }

  .weeks-container { display: flex; flex-direction: column; gap: 32px; }

  .week-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .week-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .week-header h2 {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
  }

  .btn-remove-week {
    background: none;
    border: 1px solid #3a1a1a;
    color: #ef4444;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-remove-week:hover { background: #3a1a1a; }

  .days-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0;
  }

  .day-row {
    display: grid;
    grid-template-columns: 100px 1fr auto;
    align-items: center;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    gap: 16px;
    transition: background 0.15s;
  }

  .day-row:last-child { border-bottom: none; }
  .day-row:hover { background: rgba(255,255,255,0.02); }

  .day-row.is-weekend .day-label { color: var(--weekend); }

  .day-label {
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.5px;
  }

  .time-inputs {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .input-group label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .input-group input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    padding: 8px 10px;
    width: 100px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-group input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,192,0.1);
  }

  .input-group input[type="number"] {
    width: 80px;
  }

  .off-toggle {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
  }

  .off-toggle label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .toggle-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .toggle-btn.day-off {
    background: rgba(239,68,68,0.1);
    border-color: rgba(239,68,68,0.3);
    color: #ef4444;
  }

  .day-result {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    text-align: right;
    min-width: 140px;
  }

  .day-result .hours-normal { color: var(--normal); }
  .day-result .hours-night { color: var(--accent3); }
  .day-result .hours-weekend { color: var(--weekend); }
  .day-result .hours-total {
    font-size: 1rem;
    font-weight: 500;
    color: var(--text);
    display: block;
    margin-bottom: 2px;
  }
  .day-result .breakdown {
    font-size: 0.7rem;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .week-summary {
    background: var(--surface2);
    border-top: 1px solid var(--border);
    padding: 20px 24px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
  }

  .summary-stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .summary-stat .label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
  }

  .summary-stat .value {
    font-size: 1.5rem;
    font-weight: 800;
    font-family: 'DM Mono', monospace;
  }

  .summary-stat.total .value { color: var(--accent); }
  .summary-stat.night .value { color: var(--accent3); }
  .summary-stat.weekend .value { color: var(--weekend); }
  .summary-stat.effective .value { color: var(--text); }

  .actions {
    display: flex;
    gap: 12px;
    margin-top: 32px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    padding: 14px 28px;
    border-radius: 10px;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
  }

  .btn-primary:hover {
    background: #00f5d4;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(0,229,192,0.25);
  }

  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .midnight-note {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent3);
    margin-top: 2px;
  }

  .rota-summary {
    margin-top: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .rota-summary-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .rota-summary-header h2 {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent3);
    font-family: 'DM Mono', monospace;
  }

  .rota-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 0;
  }

  .rota-stat {
    padding: 24px;
    border-right: 1px solid var(--border);
  }

  .rota-stat:last-child { border-right: none; }

  .rota-stat .label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .rota-stat .value {
    font-size: 2rem;
    font-weight: 800;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
  }

  .rota-stat .sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .btn-print {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    padding: 14px 28px;
    border-radius: 10px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--accent3);
    border-color: var(--accent3);
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .btn-print:hover {
    background: rgba(167,139,250,0.1);
  }

  /* ===== PRINT STYLES ===== */
  @media print {
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

    body {
      background: #fff;
      color: #000;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      padding: 0;
    }

    .app > header,
    .weeks-container,
    .actions,
    .rota-summary {
      display: none !important;
    }

    .print-sheet {
      display: block !important;
    }

    .print-sheet {
      padding: 20px;
    }
  }

  .print-sheet { display: none; }
    .day-row {
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .day-result { text-align: left; }
    .time-inputs { gap: 8px; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Rota Calculator</h1>
    <p>// shift hours · night &amp; weekend enhancements · midnight splits</p>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--normal)"></div>Standard hours</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent3)"></div>Night (8pm–6am) +25%</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--weekend)"></div>Weekend +33%</div>
    </div>
  </header>

  <div class="weeks-container" id="weeksContainer"></div>

  <div class="actions">
    <button class="btn btn-primary" onclick="addWeek()">+ Add Week</button>
    <button class="btn btn-secondary" onclick="calculate()">Recalculate All</button>
    <button class="btn btn-print" onclick="printSummary()">🖨 Print Summary</button>
  </div>

  <div class="rota-summary" id="rotaSummary" style="display:none">
    <div class="rota-summary-header"><h2>Rota Totals</h2></div>
    <div class="rota-grid" id="rotaGrid"></div>
  </div>

  <!-- PRINT SHEET -->
  <div class="print-sheet" id="printSheet"></div>
</div>

<script>
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const WEEKEND = ['Saturday','Sunday'];
const NIGHT_START = 20; // 8pm
const NIGHT_END = 6;    // 6am
const NIGHT_RATE = 0.25;
const WEEKEND_RATE = 0.33;

let weeks = [];
let weekCount = 0;

function addWeek() {
  weekCount++;
  const id = weekCount;
  const weekData = {
    id,
    days: DAYS.map(d => ({ name: d, start: '', lunchStart: '', lunchMins: 30, end: '', dayOff: false }))
  };
  weeks.push(weekData);
  renderWeek(weekData);
  calculate();
}

function renderWeek(week) {
  const container = document.getElementById('weeksContainer');
  const card = document.createElement('div');
  card.className = 'week-card';
  card.id = `week-${week.id}`;

  const canRemove = weeks.length > 1;
  card.innerHTML = `
    <div class="week-header">
      <h2>Week ${week.id}</h2>
      ${canRemove ? `<button class="btn-remove-week" onclick="removeWeek(${week.id})">Remove Week</button>` : ''}
    </div>
    <div class="days-grid" id="days-${week.id}">
      ${week.days.map((day, i) => renderDay(week.id, day, i)).join('')}
    </div>
    <div class="week-summary" id="summary-${week.id}">
      <div class="summary-stat total"><div class="label">Total Hours</div><div class="value" id="wk-total-${week.id}">—</div></div>
      <div class="summary-stat night"><div class="label">Night Hours</div><div class="value" id="wk-night-${week.id}">—</div></div>
      <div class="summary-stat weekend"><div class="label">Weekend Hours</div><div class="value" id="wk-weekend-${week.id}">—</div></div>
      <div class="summary-stat effective"><div class="label">Effective Hours</div><div class="value" id="wk-effective-${week.id}">—</div></div>
    </div>
  `;
  container.appendChild(card);
}

function renderDay(weekId, day, idx) {
  const isWeekend = WEEKEND.includes(day.name);
  return `
    <div class="day-row ${isWeekend ? 'is-weekend' : ''}" id="row-${weekId}-${idx}">
      <div class="day-label">${day.name}</div>
      <div class="time-inputs" id="inputs-${weekId}-${idx}">
        <div class="input-group">
          <label>Start</label>
          <input type="time" value="${day.start}" onchange="updateDay(${weekId},${idx},'start',this.value)" ${day.dayOff ? 'disabled' : ''}>
        </div>
        <div class="input-group">
          <label>Lunch Start</label>
          <input type="time" value="${day.lunchStart}" onchange="updateDay(${weekId},${idx},'lunchStart',this.value)" ${day.dayOff ? 'disabled' : ''}>
        </div>
        <div class="input-group">
          <label>Lunch (mins)</label>
          <input type="number" min="0" max="120" value="${day.lunchMins}" onchange="updateDay(${weekId},${idx},'lunchMins',this.value)" ${day.dayOff ? 'disabled' : ''}>
        </div>
        <div class="input-group">
          <label>End</label>
          <input type="time" value="${day.end}" onchange="updateDay(${weekId},${idx},'end',this.value)" ${day.dayOff ? 'disabled' : ''}>
        </div>
        <div class="off-toggle">
          <label>Status</label>
          <button class="toggle-btn ${day.dayOff ? 'day-off' : ''}" onclick="toggleDayOff(${weekId},${idx})">${day.dayOff ? 'Day Off' : 'Working'}</button>
        </div>
      </div>
      <div class="day-result" id="result-${weekId}-${idx}"><span class="breakdown" style="color:var(--text-muted)">Enter times</span></div>
    </div>
  `;
}

function updateDay(weekId, dayIdx, field, value) {
  const week = weeks.find(w => w.id === weekId);
  if (!week) return;
  week.days[dayIdx][field] = field === 'lunchMins' ? parseInt(value) || 0 : value;
  calculate();
}

function toggleDayOff(weekId, dayIdx) {
  const week = weeks.find(w => w.id === weekId);
  if (!week) return;
  week.days[dayIdx].dayOff = !week.days[dayIdx].dayOff;
  // Re-render the row
  const row = document.getElementById(`row-${weekId}-${dayIdx}`);
  const day = week.days[dayIdx];
  const isWeekend = WEEKEND.includes(day.name);
  row.outerHTML = renderDay(weekId, day, dayIdx).replace('<div class="day-row', `<div class="day-row`);
  // Simpler: just re-render the whole week
  const card = document.getElementById(`week-${weekId}`);
  card.remove();
  renderWeek(week);
  calculate();
}

function removeWeek(weekId) {
  weeks = weeks.filter(w => w.id !== weekId);
  document.getElementById(`week-${weekId}`).remove();
  calculate();
}

// Parse "HH:MM" to minutes since midnight
function parseTime(t) {
  if (!t) return null;
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function fmtHours(mins) {
  if (mins === null || isNaN(mins)) return '—';
  const h = Math.floor(mins / 60);
  const m = Math.round(mins % 60);
  return m > 0 ? `${h}h ${m}m` : `${h}h`;
}

// Given a segment [startMins, endMins] on a given dayName (0=Mon..6=Sun in week),
// returns { normal, night, weekend } minutes
// dayIndex: 0=Monday ... 6=Sunday
function classifySegment(startMins, endMins, dayIndex) {
  // startMins and endMins are minutes within a single calendar day (0–1439)
  const dayName = DAYS[dayIndex];
  const isWeekend = WEEKEND.includes(dayName);

  let normal = 0, night = 0, weekend = 0;
  const duration = endMins - startMins;
  if (duration <= 0) return { normal, night, weekend };

  // Night window: 20*60 to 6*60 (next day = 1440+360 = 1800, but we're within one day)
  // Night within a day: [0, 360] and [1200, 1440)
  // We'll iterate minute by minute is too slow; instead split at boundaries
  const boundaries = [0, NIGHT_END * 60, NIGHT_START * 60, 24 * 60];
  // Night zones within a single day: 0–360 (6am) and 1200–1440 (8pm)
  
  function isNightMinute(m) {
    return m < NIGHT_END * 60 || m >= NIGHT_START * 60;
  }

  // Split segment at boundaries
  const pts = [startMins];
  for (const b of [NIGHT_END * 60, NIGHT_START * 60]) {
    if (b > startMins && b < endMins) pts.push(b);
  }
  pts.push(endMins);

  for (let i = 0; i < pts.length - 1; i++) {
    const segStart = pts[i];
    const segEnd = pts[i + 1];
    const segMins = segEnd - segStart;
    const midpoint = (segStart + segEnd) / 2;
    const nightSeg = isNightMinute(midpoint);

    if (isWeekend) {
      weekend += segMins;
    } else if (nightSeg) {
      night += segMins;
    } else {
      normal += segMins;
    }
  }

  return { normal, night, weekend };
}

// Calculate a single day's shift, handling midnight crossover
// Returns array of { dayIndex, normal, night, weekend, totalWorked } — one entry per calendar day touched
function calcShift(dayIndex, startStr, lunchStartStr, lunchMins, endStr) {
  const start = parseTime(startStr);
  let end = parseTime(endStr);
  if (start === null || end === null) return null;

  // If end <= start, shift crosses midnight
  const crossesMidnight = end <= start;
  if (crossesMidnight) end += 24 * 60;

  // Lunch: remove lunch from worked time
  // We'll treat lunch as a gap in the shift
  const lunchStart = parseTime(lunchStartStr);
  const lunchEnd = lunchStart !== null ? lunchStart + lunchMins : null;

  // Build worked segments (excluding lunch)
  let segments = [];
  if (lunchStart !== null && lunchMins > 0 && lunchStart >= start && lunchEnd <= end) {
    if (lunchStart > start) segments.push([start, lunchStart]);
    if (lunchEnd < end) segments.push([lunchEnd, end]);
  } else {
    segments.push([start, end]);
  }

  // Now split segments across midnight boundary (1440 mins)
  const MIDNIGHT = 24 * 60;
  let dayResults = {};

  function addToDay(dIdx, n, ni, w) {
    const key = ((dIdx % 7) + 7) % 7;
    if (!dayResults[key]) dayResults[key] = { normal: 0, night: 0, weekend: 0 };
    dayResults[key].normal += n;
    dayResults[key].night += ni;
    dayResults[key].weekend += w;
  }

  for (const [s, e] of segments) {
    if (!crossesMidnight || e <= MIDNIGHT) {
      // All on same day
      const { normal, night, weekend } = classifySegment(s, e, dayIndex);
      addToDay(dayIndex, normal, night, weekend);
    } else {
      // Split at midnight
      if (s < MIDNIGHT) {
        const { normal, night, weekend } = classifySegment(s, MIDNIGHT, dayIndex);
        addToDay(dayIndex, normal, night, weekend);
      }
      const nextDayStart = Math.max(s, MIDNIGHT) - MIDNIGHT;
      const nextDayEnd = e - MIDNIGHT;
      const nextDayIndex = (dayIndex + 1) % 7;
      const { normal, night, weekend } = classifySegment(nextDayStart, nextDayEnd, nextDayIndex);
      addToDay(nextDayIndex, normal, night, weekend);
    }
  }

  return { dayResults, crossesMidnight };
}

function calculate() {
  let rotaNormal = 0, rotaNight = 0, rotaWeekend = 0;

  for (const week of weeks) {
    // We need to accumulate results per day (midnight overflow can add to next day)
    let dayTotals = {}; // dayIndex -> {normal, night, weekend}
    DAYS.forEach((_, i) => { dayTotals[i] = { normal: 0, night: 0, weekend: 0 }; });

    for (let i = 0; i < week.days.length; i++) {
      const day = week.days[i];
      if (day.dayOff) continue;
      const result = calcShift(i, day.start, day.lunchStart, parseInt(day.lunchMins) || 0, day.end);
      if (!result) continue;

      for (const [dIdx, vals] of Object.entries(result.dayResults)) {
        const idx = parseInt(dIdx);
        dayTotals[idx].normal += vals.normal;
        dayTotals[idx].night += vals.night;
        dayTotals[idx].weekend += vals.weekend;
      }
    }

    // Render day results
    for (let i = 0; i < week.days.length; i++) {
      const day = week.days[i];
      const el = document.getElementById(`result-${week.id}-${i}`);
      if (!el) continue;

      if (day.dayOff) {
        el.innerHTML = `<span class="breakdown" style="color:var(--text-muted)">Day off</span>`;
        continue;
      }

      const t = dayTotals[i];
      const total = t.normal + t.night + t.weekend;

      // Check if this day received overflow from previous night shift
      const result = calcShift(i, day.start, day.lunchStart, parseInt(day.lunchMins)||0, day.end);
      const hasMidnight = result && result.crossesMidnight;

      if (total === 0) {
        el.innerHTML = `<span class="breakdown" style="color:var(--text-muted)">Enter times</span>`;
        continue;
      }

      let breakdown = [];
      if (t.normal > 0) breakdown.push(`<span class="hours-normal">${fmtHours(t.normal)} standard</span>`);
      if (t.night > 0) breakdown.push(`<span class="hours-night">${fmtHours(t.night)} night</span>`);
      if (t.weekend > 0) breakdown.push(`<span class="hours-weekend">${fmtHours(t.weekend)} weekend</span>`);

      el.innerHTML = `
        <span class="hours-total">${fmtHours(total)}</span>
        <span class="breakdown">${breakdown.join('<br>')}</span>
        ${hasMidnight ? `<div class="midnight-note">↪ crosses midnight</div>` : ''}
      `;
    }

    // Week summary
    let wkNormal = 0, wkNight = 0, wkWeekend = 0;
    for (let i = 0; i < 7; i++) {
      wkNormal += dayTotals[i].normal;
      wkNight += dayTotals[i].night;
      wkWeekend += dayTotals[i].weekend;
    }
    const wkTotal = wkNormal + wkNight + wkWeekend;
    const wkEffective = wkNormal + wkNight * (1 + NIGHT_RATE) + wkWeekend * (1 + WEEKEND_RATE);

    const setEl = (id, val) => { const e = document.getElementById(id); if (e) e.textContent = val; };
    setEl(`wk-total-${week.id}`, fmtHours(wkTotal));
    setEl(`wk-night-${week.id}`, fmtHours(wkNight));
    setEl(`wk-weekend-${week.id}`, fmtHours(wkWeekend));
    setEl(`wk-effective-${week.id}`, fmtHours(wkEffective));

    rotaNormal += wkNormal;
    rotaNight += wkNight;
    rotaWeekend += wkWeekend;
  }

  // Rota summary
  const rotaSummary = document.getElementById('rotaSummary');
  if (weeks.length > 1) {
    rotaSummary.style.display = 'block';
    const rotaTotal = rotaNormal + rotaNight + rotaWeekend;
    const rotaEffective = rotaNormal + rotaNight * (1 + NIGHT_RATE) + rotaWeekend * (1 + WEEKEND_RATE);
    document.getElementById('rotaGrid').innerHTML = `
      <div class="rota-stat"><div class="label">Total Hours</div><div class="value">${fmtHours(rotaTotal)}</div><div class="sub">across ${weeks.length} weeks</div></div>
      <div class="rota-stat"><div class="label">Night Hours</div><div class="value" style="color:var(--accent3)">${fmtHours(rotaNight)}</div><div class="sub">+25% enhancement</div></div>
      <div class="rota-stat"><div class="label">Weekend Hours</div><div class="value" style="color:var(--weekend)">${fmtHours(rotaWeekend)}</div><div class="sub">+33% enhancement</div></div>
      <div class="rota-stat"><div class="label">Effective Hours</div><div class="value" style="color:var(--text)">${fmtHours(rotaEffective)}</div><div class="sub">with enhancements applied</div></div>
    `;
  } else {
    rotaSummary.style.display = 'none';
  }
}

// Start with one week
addWeek();

function printSummary() {
  calculate();

  let rotaNormal = 0, rotaNight = 0, rotaWeekend = 0;

  // Build per-week data for print
  const weekRows = weeks.map(week => {
    let dayTotals = {};
    DAYS.forEach((_, i) => { dayTotals[i] = { normal: 0, night: 0, weekend: 0 }; });

    for (let i = 0; i < week.days.length; i++) {
      const day = week.days[i];
      if (day.dayOff) continue;
      const result = calcShift(i, day.start, day.lunchStart, parseInt(day.lunchMins)||0, day.end);
      if (!result) continue;
      for (const [dIdx, vals] of Object.entries(result.dayResults)) {
        const idx = parseInt(dIdx);
        dayTotals[idx].normal += vals.normal;
        dayTotals[idx].night += vals.night;
        dayTotals[idx].weekend += vals.weekend;
      }
    }

    let wkNormal = 0, wkNight = 0, wkWeekend = 0;
    for (let i = 0; i < 7; i++) {
      wkNormal += dayTotals[i].normal;
      wkNight += dayTotals[i].night;
      wkWeekend += dayTotals[i].weekend;
    }
    rotaNormal += wkNormal;
    rotaNight += wkNight;
    rotaWeekend += wkWeekend;

    return { week, dayTotals, wkNormal, wkNight, wkWeekend };
  });

  const rotaTotal = rotaNormal + rotaNight + rotaWeekend;
  const rotaEffective = rotaNormal + rotaNight * (1 + NIGHT_RATE) + rotaWeekend * (1 + WEEKEND_RATE);

  // Build print HTML
  let html = `
    <style>
      .ps-title { font-size: 22px; font-weight: bold; margin-bottom: 4px; }
      .ps-sub { font-size: 11px; color: #666; margin-bottom: 24px; }
      table { width: 100%; border-collapse: collapse; margin-bottom: 28px; font-size: 12px; }
      th { background: #111; color: #fff; padding: 8px 10px; text-align: left; font-weight: 600; letter-spacing: 0.5px; }
      td { padding: 7px 10px; border-bottom: 1px solid #ddd; }
      tr:last-child td { border-bottom: none; }
      tr:nth-child(even) td { background: #f9f9f9; }
      .day-off td { color: #aaa; font-style: italic; }
      .is-weekend td { background: #fffbf0 !important; }
      .wk-label { font-size: 13px; font-weight: bold; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
      .summary-table th { background: #222; }
      .summary-table td { font-weight: 600; }
      .totals-box { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border: 2px solid #111; margin-top: 8px; }
      .totals-cell { padding: 14px 16px; border-right: 1px solid #ddd; }
      .totals-cell:last-child { border-right: none; }
      .totals-cell .t-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #666; margin-bottom: 4px; }
      .totals-cell .t-value { font-size: 20px; font-weight: bold; }
      .totals-cell .t-sub { font-size: 10px; color: #888; margin-top: 2px; }
      .section-title { font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin: 24px 0 8px; border-bottom: 2px solid #111; padding-bottom: 4px; }
    </style>

    <div class="ps-title">Rota Hours Summary</div>
    <div class="ps-sub">Generated ${new Date().toLocaleDateString('en-GB', {weekday:'long', year:'numeric', month:'long', day:'numeric'})}</div>
  `;

  // One table per week
  weekRows.forEach(({ week, dayTotals, wkNormal, wkNight, wkWeekend }) => {
    const wkTotal = wkNormal + wkNight + wkWeekend;
    const wkEffective = wkNormal + wkNight * (1 + NIGHT_RATE) + wkWeekend * (1 + WEEKEND_RATE);

    html += `<div class="wk-label">Week ${week.id}</div>`;
    html += `<table>
      <thead>
        <tr>
          <th>Day</th>
          <th>Start</th>
          <th>Lunch</th>
          <th>End</th>
          <th>Standard</th>
          <th>Night</th>
          <th>Weekend</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody>`;

    week.days.forEach((day, i) => {
      const isWeekend = WEEKEND.includes(day.name);
      if (day.dayOff) {
        html += `<tr class="day-off"><td>${day.name}</td><td colspan="7">Day Off</td></tr>`;
        return;
      }
      const t = dayTotals[i];
      const total = t.normal + t.night + t.weekend;
      const lunchStr = day.lunchStart ? `${day.lunchStart} (${day.lunchMins}m)` : '—';
      html += `<tr class="${isWeekend ? 'is-weekend' : ''}">
        <td><strong>${day.name}</strong></td>
        <td>${day.start || '—'}</td>
        <td>${lunchStr}</td>
        <td>${day.end || '—'}</td>
        <td>${t.normal > 0 ? fmtHours(t.normal) : '—'}</td>
        <td>${t.night > 0 ? fmtHours(t.night) : '—'}</td>
        <td>${t.weekend > 0 ? fmtHours(t.weekend) : '—'}</td>
        <td><strong>${total > 0 ? fmtHours(total) : '—'}</strong></td>
      </tr>`;
    });

    html += `<tr style="background:#f0f0f0">
      <td colspan="4"><strong>Week ${week.id} Totals</strong></td>
      <td>${fmtHours(wkNormal)}</td>
      <td>${fmtHours(wkNight)}</td>
      <td>${fmtHours(wkWeekend)}</td>
      <td><strong>${fmtHours(wkTotal)}</strong></td>
    </tr>`;
    html += `</tbody></table>`;
  });

  // Overall rota totals box
  html += `<div class="section-title">Rota Overview — ${weeks.length} week${weeks.length > 1 ? 's' : ''}</div>`;
  html += `<div class="totals-box">
    <div class="totals-cell">
      <div class="t-label">Total Hours</div>
      <div class="t-value">${fmtHours(rotaTotal)}</div>
      <div class="t-sub">across ${weeks.length} week${weeks.length > 1 ? 's' : ''}</div>
    </div>
    <div class="totals-cell">
      <div class="t-label">Night Hours</div>
      <div class="t-value">${fmtHours(rotaNight)}</div>
      <div class="t-sub">+25% enhancement</div>
    </div>
    <div class="totals-cell">
      <div class="t-label">Weekend Hours</div>
      <div class="t-value">${fmtHours(rotaWeekend)}</div>
      <div class="t-sub">+33% enhancement</div>
    </div>
    <div class="totals-cell">
      <div class="t-label">Effective Hours</div>
      <div class="t-value">${fmtHours(rotaEffective)}</div>
      <div class="t-sub">with enhancements applied</div>
    </div>
  </div>`;

  document.getElementById('printSheet').innerHTML = html;
  window.print();
}
</script>
</body>
</html>
